  bidspotter: 0.18
  klaravik: 0.12
  vavato: 0.15

platform_selling_fees:
  olx: 0.00               # Free for sellers
  ebay_private: 0.00       # Private EEA sellers: 0% (since March 2023)
  ebay_business: 0.11      # ~8-13%, avg 11%
  ebay_regulatory: 0.0035  # 0.35% regulatory fee
  marktplaats: 0.00        # Seller free, buyer pays 5%
