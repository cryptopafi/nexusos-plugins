# ─── Demand Channels ─────────────────────────────────────────
demand_channels:
  publi24:
    enabled: false
    wave: 2
    url: "https://www.publi24.ro"
    method: brave-search
    keywords: ["caut", "cumpăr", "doresc"]

  kros:
    enabled: false
    wave: 2
    url: "https://kros.ro"
    method: web-scraper
    notes: "Romania B2B RFQ marketplace."

  alibaba-rfq:
    enabled: false
    wave: 2
    url: "https://seller.alibaba.com/rfq"
    method: official-api
    notes: "20K+ requests/day. Official API at developer.alibaba.com."

  machineseeker:
    enabled: true
    wave: 1
    url: "https://www.machineseeker.com"
    mirror_url: "https://www.maschinensucher.de"
    method: exa                           # Primary: Exa livecrawl — no anti-bot, reliable
    fallback_method: sonar-pro
    categories: [compressors, welding, CNC, forklifts, generators, metalworking, woodworking, construction, agricultural]
    priority: PRIMARY                      # Use BEFORE OLX/eBay for industrial categories
    regions: [DE, NL, PL, AT, FR, IT, BE, SE, CZ, ES]
    selling_fee_pct: 0                    # Free classifieds (seller pays listing fee EUR 4.49/month)
    exa_config:
      includeDomains: ["machineseeker.com", "maschinensucher.de"]
      livecrawl: "preferred"
      numResults: 5
      textMaxCharacters: 800
      highlightsPerUrl: 1
      highlightsQuery: "price EUR"
    price_patterns:                        # Regex patterns found in Exa highlights
      - "€[\\d.,]+ Fixed price plus VAT"
      - "€[\\d.,]+ ONO plus VAT"
      - "[\\d.,]+ € Festpreis zzgl. MwSt."
      - "[\\d.,]+ € VB zzgl. MwSt."
    skip_patterns:
      - "Preisinfo"                        # Price on request — no public price
      - "Price info"
    currency_conversions:
      PLN: 4.25                            # Polish listings in PLN → EUR
      CZK: 25.0                            # Czech listings
    discount_by_type:
      VB: 0.85                             # Verhandlungsbasis (negotiable) — 15% off
      Festpreis: 0.90                      # Fixed price — 10% off
      ONO: 0.85                            # Or Nearest Offer — 15% off
    notes: |
      Europe's largest used industrial machinery marketplace. 11M buyers, 200K+ listings.
      machineseeker.com (EN/international) and maschinensucher.de (DE) share the same
      inventory — one Exa call with includeDomains covers both.
      Seller-side REST API exists (listing management only) — NOT usable for price scraping.
      Confirmed working via Exa livecrawl 2026-03-22.
      URL patterns: /mss/[brand]+[model] (search) | /[brand]-[model]/i-[id] (listing).
      Verified live prices for: Atlas Copco GA30 (EUR 3,490-4,700), ZT110-class (EUR 3,750+),
      Kemppi MasterTig (EUR 1,250), Toyota 8FBE16T (EUR 13,900-26,890), Airpress APS (EUR 1,550-5,800).
