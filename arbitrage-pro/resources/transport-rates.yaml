# Transport per item at different quantities (NL→RO):
#   1 pallet:   €180/item (groupage conservative spot, v4)
#   3 pallets:  €100/item (multi-pallet Paneuropa: €300 total)
#   5 pallets:  €76/item (Paneuropa: €380 total)
